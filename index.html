<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Portal | Snir Keshet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; }
        
        /* עיצוב מותאם אישית לאייקון לוח השנה ב-Dark Mode */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl overflow-hidden p-8 space-y-6">
        
        <header class="text-center space-y-2">
            <h1 class="text-3xl font-extrabold text-blue-500 tracking-tight">Finance Portal</h1>
            <p class="text-slate-500 text-sm font-medium italic">מערכת איחוד נתונים מבוססת Google Finance</p>
        </header>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">סימולי מניות (למשל: AAPL, TSLA)</label>
                <input type="text" id="tickers" value="AAPL, TSLA, NVDA" 
                    class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-white placeholder-slate-600">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">תאריך התחלה</label>
                    <input type="date" id="startDate" 
                        class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white transition-all focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">תאריך סיום</label>
                    <input type="date" id="endDate" 
                        class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white transition-all focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">תדירות דגימה</label>
                <select id="frequency" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="1d">יומי (Daily)</option>
                    <option value="1wk">שבועי (Weekly)</option>
                    <option value="1mo">חודשי (Monthly)</option>
                </select>
            </div>

            <button id="submitBtn" onclick="generateReport()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-900/20 transition-all active:scale-95 flex items-center justify-center gap-2">
                <span id="btnText">צור גיליון נתונים</span>
            </button>
        </div>

        <div id="successArea" class="hidden animate-in fade-in zoom-in duration-300">
            <a id="sheetLink" href="#" target="_blank" class="flex items-center justify-center gap-2 w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl shadow-xl transition-all">
                <span>פתח את הגיליון ב-Google Sheets</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z" />
                </svg>
            </a>
        </div>

        <div id="statusMessage" class="text-center text-xs font-mono text-slate-600 italic min-h-[1.5rem]"></div>
    </div>

    <script>
        /**
         * פונקציה לשליחת הבקשה לשרת ה-Apps Script
         */
        async function generateReport() {
            // הכתובת החדשה שסיפקת מוטמעת כאן
            const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwN-Z3GLGDCz3HZIlYNRejbYEJLxIzNazAN9v8hX9yEumtpT-cagEyM0BtdoUEZnxaA/exec";
            
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const status = document.getElementById('statusMessage');
            const successArea = document.getElementById('successArea');
            const sheetLink = document.getElementById('sheetLink');

            // 1. ולידציה של הקלט
            const tickers = document.getElementById('tickers').value.split(',').map(t => t.trim().toUpperCase());
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const frequency = document.getElementById('frequency').value;

            if (!tickers[0] || !startDate || !endDate) {
                status.innerText = "נא למלא את כל השדות בצורה תקינה.";
                status.classList.add('text-red-500');
                return;
            }

            // 2. עדכון הממשק למצב טעינה
            btn.disabled = true;
            btnText.innerText = "מעבד נתונים...";
            btn.classList.replace('bg-blue-600', 'bg-slate-700');
            status.innerText = "גוגל אוספת וממזגת את הנתונים... (כ-15 שניות)";
            status.classList.remove('text-red-500');
            successArea.classList.add('hidden');

            // 3. הכנת ה-Payload
            const payload = {
                tickers: tickers,
                startDate: startDate,
                endDate: endDate,
                frequency: frequency
            };

            try {
                // 4. שליחת ה-POST בפורמט text/plain למניעת שגיאות CORS
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                // 5. ניתוח התוצאה
                if (result.status === "success") {
                    status.innerText = "הדוח נוצר בהצלחה!";
                    sheetLink.href = result.sheetUrl;
                    successArea.classList.remove('hidden');
                    btnText.innerText = "הפעולה הושלמה";
                } else {
                    throw new Error(result.message || "שגיאה בשרת גוגל");
                }

            } catch (error) {
                console.error("Fetch Error:", error);
                status.innerText = "שגיאה: " + error.message;
                status.classList.add('text-red-500');
                btnText.innerText = "נסה שוב";
                btn.disabled = false;
                btn.classList.replace('bg-slate-700', 'bg-blue-600');
            }
        }
    </script>
</body>
</html>

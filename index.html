<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Data Portal | מחולל דוחות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* הגדרת פונט נקי ועיצוב מותאם אישית לשדות תאריך */
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body { font-family: 'Assistant', sans-serif; }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1); /* הופך את האייקון של לוח השנה ללבן בעיצוב כהה */
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden">
        
        <div class="p-6 border-b border-slate-800 bg-slate-800/30 text-center">
            <h1 class="text-2xl font-bold text-blue-500">Finance Portal</h1>
            <p class="text-slate-400 text-sm mt-1">ייצוא נתוני שוק ל-Google Sheets</p>
        </div>

        <div class="p-8 space-y-5">
            
            <div>
                <label class="block text-sm font-semibold text-slate-400 mb-1">סימולי מניות</label>
                <input type="text" id="tickers" placeholder="AAPL, TSLA, MSFT" 
                    class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-white placeholder-slate-600">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-1">תאריך התחלה</label>
                    <input type="date" id="startDate" 
                        class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-white">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-1">תאריך סיום</label>
                    <input type="date" id="endDate" 
                        class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-white">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-400 mb-1">תדירות נתונים</label>
                <select id="frequency" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-white">
                    <option value="1d">יומי (Daily)</option>
                    <option value="1wk">שבועי (Weekly)</option>
                    <option value="1mo">חודשי (Monthly)</option>
                </select>
            </div>

            <button id="submitBtn" onclick="generateReport()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-900/20 active:scale-[0.98]">
                צור גיליון נתונים
            </button>

            <div id="successArea" class="hidden animate-in fade-in slide-in-from-top-4 duration-500">
                <a id="sheetLink" href="#" target="_blank" class="flex items-center justify-center gap-2 w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-emerald-900/20">
                    <span>פתח את הגיליון החדש</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z" />
                        <path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z" />
                    </svg>
                </a>
            </div>

            <div id="statusMessage" class="text-center text-sm font-medium text-slate-500 mt-2"></div>
        </div>
    </div>

    <script>
        /**
         * פונקציה ראשית המטפלת בשליחת הנתונים
         */
        async function generateReport() {
            // החלף את הכתובת למטה בכתובת ה-WebApp שקיבלת מגוגל (מסתיים ב-exec)
            const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzg9DBD8SDgaXwNvPjxOwc-KneyJG66uKyWwL-OGPbpu19T8PiCebzmKojEU_QTdfpX/exec';
            
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('statusMessage');
            const successArea = document.getElementById('successArea');
            const sheetLink = document.getElementById('sheetLink');

            // 1. איסוף נתונים וולידציה
            const tickers = document.getElementById('tickers').value.split(',').map(t => t.trim().toUpperCase());
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const frequency = document.getElementById('frequency').value;

            if (!tickers[0] || !startDate || !endDate) {
                status.innerText = "נא למלא את כל השדות";
                status.classList.add('text-red-400');
                return;
            }

            // 2. מצב טעינה (Loading)
            btn.disabled = true;
            btn.innerText = "טוען נתונים...";
            btn.classList.replace('bg-blue-600', 'bg-slate-700');
            status.innerText = "מתקשר עם שרת Google...";
            status.classList.remove('text-red-400');
            successArea.classList.add('hidden');

            // 3. הכנת הנתונים לשליחה
            const payload = {
                tickers: tickers,
                startDate: startDate,
                endDate: endDate,
                frequency: frequency
            };

            try {
                // 4. שליחת ה-Fetch (שימוש ב-text/plain למניעת CORS Preflight)
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                // 5. טיפול בתוצאה
                if (result.status === "success") {
                    status.innerText = "הגיליון נוצר בהצלחה!";
                    sheetLink.href = result.sheetUrl;
                    successArea.classList.remove('hidden');
                    btn.innerText = "בוצע!";
                } else {
                    throw new Error(result.message || "שגיאת שרת לא ידועה");
                }

            } catch (error) {
                console.error(error);
                status.innerText = "שגיאה: " + error.message;
                status.classList.add('text-red-400');
                btn.innerText = "נסה שוב";
                btn.disabled = false;
                btn.classList.replace('bg-slate-700', 'bg-blue-600');
            }
        }
    </script>
</body>
</html>

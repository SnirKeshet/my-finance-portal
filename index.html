<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Portal | Data Merging Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-xl w-full bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden">
        <div class="bg-slate-800/50 p-8 border-b border-slate-800">
            <h1 class="text-2xl font-bold text-blue-400">Finance Data Portal</h1>
            <p class="text-slate-400 text-sm mt-2">מערכת למשיכת נתונים היסטוריים ואיחודם לגיליון Google Sheets</p>
        </div>

        <div class="p-8 space-y-6">
            
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">סימולי מניות (מופרדים בפסיק)</label>
                <input type="text" id="tickers" placeholder="למשל: TSLA, AAPL, AMZN" 
                    class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-white placeholder-slate-600">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">תאריך התחלה</label>
                    <input type="date" id="startDate" 
                        class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-white">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">תאריך סיום</label>
                    <input type="date" id="endDate" 
                        class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-white">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">תדירות נתונים</label>
                <select id="frequency" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-white appearance-none">
                    <option value="1d">יומי (Daily)</option>
                    <option value="1wk">שבועי (Weekly)</option>
                    <option value="1mo">חודשי (Monthly)</option>
                </select>
            </div>

            <button id="submitBtn" onclick="sendData()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-4 rounded-lg shadow-lg shadow-blue-900/20 transition-all flex items-center justify-center gap-2 group">
                <span>צור גיליון נתונים</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-[-4px] transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                </svg>
            </button>

            <div id="resultArea" class="hidden animate-pulse">
                <a id="sheetLink" href="#" target="_blank" class="block w-full bg-emerald-600 hover:bg-emerald-500 text-white text-center font-bold py-4 rounded-lg transition-all shadow-lg shadow-emerald-900/20">
                    פתח את הגיליון החדש ב-Google Sheets
                </a>
            </div>

            <div id="statusMsg" class="text-center text-sm text-slate-400 min-h-[20px]"></div>
        </div>
    </div>

    <script>
        /**
         * פונקציה ראשית לשליחת הנתונים לשרת ה-Apps Script
         */
        async function sendData() {
            // !!! חשוב: החלף את ה-URL למטה בכתובת שקיבלת מה-Deploy של השרת שלך !!!
            const WEB_APP_URL = 'YOUR_WEB_APP_URL';
            
            // בחירת אלמנטים מה-DOM
            const btn = document.getElementById('submitBtn');
            const statusMsg = document.getElementById('statusMsg');
            const resultArea = document.getElementById('resultArea');
            const sheetLink = document.getElementById('sheetLink');

            // איסוף נתונים מהטופס
            const tickersInput = document.getElementById('tickers').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const frequency = document.getElementById('frequency').value;

            // בדיקת תקינות בסיסית
            if (!tickersInput || !startDate || !endDate) {
                statusMsg.innerText = "נא למלא את כל השדות";
                statusMsg.className = "text-center text-sm text-red-400";
                return;
            }

            // הכנת ה-Payload
            const payload = {
                tickers: tickersInput.split(',').map(s => s.trim().toUpperCase()),
                startDate: startDate,
                endDate: endDate,
                frequency: frequency
            };

            // מצב טעינה
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>טוען נתונים...</span>
            `;
            statusMsg.innerText = "השרת מעבד את הנתונים, זה עשוי לקחת כמה שניות...";
            resultArea.classList.add('hidden');

            try {
                // שליחה ב-Fetch
                // שימוש ב-Content-Type: text/plain עוקף בעיות CORS נפוצות ב-Google Apps Script
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // נדרש לעיתים ב-GAS אם אין טיפול מפורש ב-OPTIONS
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    },
                    body: JSON.stringify(payload)
                });

                /**
                 * הערה: בגלל 'no-cors', לא ניתן לקרוא את גוף התגובה (Response Body).
                 * אם השרת שלך מוגדר לתמוך ב-CORS מלא, שנה ל-'cors' והסר את 'text/plain'.
                 * בהנחה והשרת עבד, נחכה מעט ונציג הודעה למשתמש.
                 */
                
                // במידה והשרת מחזיר JSON (שינוי מצב ל-cors):
                // const result = await response.json();
                // sheetLink.href = result.sheetUrl;
                // resultArea.classList.remove('hidden');

                statusMsg.innerText = "הפעולה הושלמה! (במידה והשתמשת ב-no-cors, בדוק את הדרייב שלך)";
                btn.innerHTML = "בוצע!";
                
            } catch (error) {
                console.error("Error:", error);
                statusMsg.innerText = "חלה שגיאה בתקשורת עם השרת";
                statusMsg.className = "text-center text-sm text-red-400";
            } finally {
                btn.disabled = false;
                if(btn.innerHTML.includes('spin')) btn.innerHTML = "צור גיליון נתונים";
            }
        }
    </script>
</body>
</html>

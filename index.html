<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snir Finance Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #020617; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl p-8 space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-extrabold text-blue-500">Finance Portal</h1>
            <p class="text-slate-500 text-sm mt-1 font-medium">מיזוג נתונים מאוחד (Yahoo/Google)</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">סימולי מניות</label>
                <input type="text" id="tickers" value="AAPL, TSLA, NVDA" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <input type="date" id="start" class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm">
                <input type="date" id="end" class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm">
            </div>

            <button id="btn" onclick="run()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold shadow-lg transition-all active:scale-95">
                ייצא נתונים לגיליון
            </button>
        </div>

        <div id="status" class="text-center text-xs text-slate-600 font-mono italic min-h-[1rem]"></div>
        
        <div id="result" class="hidden animate-bounce">
            <a id="link" href="#" target="_blank" class="flex items-center justify-center gap-2 w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl shadow-xl">
                פתח את הגיליון החדש
            </a>
        </div>
    </div>

    <script>
        async function run() {
            // הקישור שסיפקת הוטמע כאן:
            const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx2DEqyXxbrOAqaQXNFS1FV7NkgBufOQX9HDHbidMvcy65LmYaLA3tt3Sxuwapqz3sJ/exec";
            
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const resultDiv = document.getElementById('result');

            const payload = {
                tickers: document.getElementById('tickers').value.split(',').map(t => t.trim()),
                startDate: document.getElementById('start').value,
                endDate: document.getElementById('end').value,
                frequency: '1d'
            };

            if (!payload.startDate || !payload.endDate) {
                status.innerText = "נא לבחור תאריכים";
                return;
            }

            btn.disabled = true;
            btn.innerText = "מעבד נתונים...";
            status.innerText = "המערכת מנסה למשוך נתונים (Yahoo -> Google Fallback)...";
            resultDiv.classList.add('hidden');

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.status === "success") {
                    document.getElementById('link').href = data.sheetUrl;
                    resultDiv.classList.remove('hidden');
                    status.innerText = "הפעולה הושלמה!";
                } else {
                    status.innerText = "שגיאה: " + data.message;
                }
            } catch (e) {
                status.innerText = "שגיאת תקשורת. וודא שה-Web App פורסם כ-Anyone.";
            } finally {
                btn.disabled = false;
                btn.innerText = "ייצא נתונים לגיליון";
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Portal v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-lg bg-slate-800 p-6 rounded-xl shadow-2xl border border-slate-700 mt-10">
        <h1 class="text-xl font-bold text-blue-400 mb-6 text-center">מחולל גיליונות פיננסיים</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm mb-1">טיקרים (פסיק מפריד):</label>
                <input type="text" id="tickers" value="AAPL, TSLA" class="w-full p-2 bg-slate-900 border border-slate-600 rounded text-white">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="startDate" class="p-2 bg-slate-900 border border-slate-600 rounded text-white text-sm">
                <input type="date" id="endDate" class="p-2 bg-slate-900 border border-slate-600 rounded text-white text-sm">
            </div>

            <button id="mainBtn" onclick="runProcess()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded font-bold transition">
                שלח בקשה לשרת
            </button>
        </div>

        <div id="successArea" class="hidden mt-6 p-4 bg-emerald-900/30 border border-emerald-500 rounded text-center">
            <p class="mb-3 text-emerald-400 font-bold">הקובץ נוצר בהצלחה!</p>
            <a id="sheetUrl" href="#" target="_blank" class="inline-block bg-emerald-500 text-slate-900 px-4 py-2 rounded font-bold">פתח Google Sheet</a>
        </div>

        <div id="debugLog" class="mt-6 p-3 bg-black/50 rounded text-xs font-mono text-slate-400 overflow-y-auto max-h-32">
            מערכת מוכנה...
        </div>
    </div>

    <script>
        const log = (msg) => {
            const div = document.getElementById('debugLog');
            div.innerHTML += `<br>> ${msg}`;
            console.log(msg);
        };

        async function runProcess() {
            // !!! שנה את הכתובת הזו לכתובת ה-WebApp שלך !!!
            const URL = "https://script.google.com/macros/s/AKfycbzg9DBD8SDgaXwNvPjxOwc-KneyJG66uKyWwL-OGPbpu19T8PiCebzmKojEU_QTdfpX/exec"; 
            
            const btn = document.getElementById('mainBtn');
            const successArea = document.getElementById('successArea');
            const logDiv = document.getElementById('debugLog');

            // איסוף נתונים
            const data = {
                tickers: document.getElementById('tickers').value.split(',').map(s => s.trim()),
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: '1d'
            };

            if (!data.startDate || !URL.startsWith('http')) {
                log("שגיאה: חסר תאריך או URL שרת לא תקין");
                return;
            }

            // עדכון ממשק
            btn.disabled = true;
            btn.innerText = "מעבד...";
            log("שולח בקשה ל-Google Apps Script...");

            try {
                // שימוש ב-fetch עם הגדרות שעוקפות בעיות CORS נפוצות ב-GAS
                const response = await fetch(URL, {
                    method: 'POST',
                    mode: 'no-cors', // מאפשר שליחה ללא שגיאת דפדפן, אך לא ניתן לקרוא את התגובה ישירות
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(data)
                });

                log("הבקשה נשלחה בהצלחה.");
                log("הערה: במצב no-cors לא ניתן לקבל את הלינק חזרה ב-JS.");
                log("בדוק את ה-Google Drive שלך, הקובץ אמור להיווצר שם.");
                
                btn.innerText = "נשלח!";
                btn.classList.replace('bg-blue-600', 'bg-slate-600');

            } catch (e) {
                log("שגיאה קריטית: " + e.message);
                btn.disabled = false;
                btn.innerText = "נסה שוב";
            }
        }
    </script>
</body>
</html>
